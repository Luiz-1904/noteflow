services:
  - type: web
    name: noteflow
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: PORT
        value: 10000
      - key: APP_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: noteflow-db
          property: connectionString

databases:
  - name: noteflow-db
    databaseName: noteflow
    user: noteflow
